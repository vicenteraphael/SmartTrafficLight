name: Compile Examples

on:
  push:
    paths:
    - ".github/workflows/compile-examples.yml"
    - "examples/**"
    - "src/**"
  pull_request:
    paths:
    - ".github/workflows/compile-examples.yml"
    - "examples/**"
    - "src/**"
  schedule:
    # Run every Saturday at 12 PM UTC to catch breakage caused by changes to external resources (libraries, platforms).
    - cron: "0 12 * * SAT"
  workflow_dispatch:

jobs:
  build:
    name: ${{ matrix.board.fqbn }}
    runs-on: ubuntu-latest

    env:
      SKETCHES_REPORTS_PATH: sketches-reports

    strategy:
      fail-fast: false

      matrix:
        board:
          - fqbn: arduino:avr:uno
            platforms: |
              - name: arduino:avr
            artifact-name-suffix: arduino-avr-uno
          - fqbn: arduino:avr:nano
            platforms: |
              - name: arduino:avr
            artifact-name-suffix: arduino-avr-nano
          - fqbn: arduino:avr:mega
            platforms: |
              - name: arduino:avr
            artifact-name-suffix: arduino-avr-mega
          - fqbn: arduino:avr:leonardo
            platforms: |
              - name: arduino:avr
            artifact-name-suffix: arduino-avr-leonardo
          - fqbn: esp32:esp32:esp32
            platforms: |
              - name: esp32:esp32
            artifact-name-suffix: esp32-esp32-esp32

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Compile examples
        uses: arduino/compile-sketches@v1
        with:
          fqbn: ${{ matrix.board.fqbn }}
          platforms: ${{ matrix.board.platforms }}
          libraries: |
            - source-path: ./
          sketch-paths: |
            - examples
          sketches-report-path: ${{ env.SKETCHES_REPORTS_PATH }}